name: Grade Git Lesson

on:
  repository_dispatch:
    types: [student_submission]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout grader repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Grade git_01
        run: npm run grade:git_01
        env:
          COURSE_REPO: Shergould/vibecoding-course
          BASE_BRANCH: main
          GRADER_BOT_TOKEN: ${{ secrets.GRADER_BOT_TOKEN }}
          GIT_01_COMPLETION_KEY: ${{ secrets.GIT_01_COMPLETION_KEY }}

      - name: Commit results
        run: |
          git config user.name "vibecoding-grader-bot"
          git config user.email "grader-bot@example.com"
          git add data/
          git commit -m "update git_01 grading results" || exit 0
          git push
